services:
  qdrant:
    image: qdrant/qdrant:v1.13.2
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6343}:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    entrypoint: ["/bin/sh", "-c", "find /qdrant/storage -name .DS_Store -delete 2>/dev/null; exec ./entrypoint.sh"]
    environment:
      - QDRANT__SERVICE__GRPC_PORT=${QDRANT_GRPC_PORT:-6334}
      - QDRANT__STORAGE__OPTIMIZERS__DEFAULT_SEGMENT_NUMBER=1

  app:
    build: .
    ports:
      - "${API_PORT:-18900}:18900"
    volumes:
      - ./data:/app/data
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - HF_HOME=/app/data/models
      - MODELSCOPE_CACHE=/app/data/models
    depends_on:
      - qdrant
    restart: unless-stopped
