<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!--
    SinkDuce Logo — Concept 4: Editorial Typography
    Monospaced wordmark with extreme letter-spacing (0.6em).
    Thin vertical divider separates SINK from DUCE.
    Solid underline anchors the composition.
    Stark, architectural, Bauhaus-meets-Swiss-Style.
  -->

  <!-- SINK -->
  <text x="70" y="30"
        font-family="ui-monospace, 'SF Mono', 'Menlo', 'Consolas', monospace"
        font-size="13"
        font-weight="300"
        fill="#06120D"
        letter-spacing="0.6em"
        text-anchor="middle"
        dominant-baseline="alphabetic">SINK</text>

  <!-- DUCE -->
  <text x="158" y="30"
        font-family="ui-monospace, 'SF Mono', 'Menlo', 'Consolas', monospace"
        font-size="13"
        font-weight="300"
        fill="#06120D"
        letter-spacing="0.6em"
        text-anchor="middle"
        dominant-baseline="alphabetic">DUCE</text>

  <!-- Vertical divider -->
  <line x1="118" y1="14" x2="118" y2="46" stroke="#2A4D3E" stroke-width="0.3" stroke-linecap="round"/>

  <!-- Solid underline -->
  <line x1="42" y1="40" x2="270" y2="40" stroke="#2A4D3E" stroke-width="0.5" stroke-linecap="square"/>
</svg>
